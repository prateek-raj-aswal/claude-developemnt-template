# Production override — used together with docker-compose.yml:
#
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
#
# This file overrides the base compose file for production deployment on EC2.
# All secrets are injected via environment variables — no secret values are
# hardcoded here. Copy .env.example to .env on the EC2 host and fill in values.
#
# Required GitHub secrets: POSTGRES_PASSWORD, JWT_SECRET
# Required GitHub vars:    EC2_HOST, EC2_USER, ECR_REGISTRY, NEXT_PUBLIC_*

services:

  # ── Database ──────────────────────────────────────────────────────────────────
  postgres:
    # Pin to specific patch tag; never use :latest.
    image: postgres:16.3-alpine3.20
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-kanban}
      POSTGRES_USER: ${POSTGRES_USER:-kanban}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - kanban-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-kanban} -d ${POSTGRES_DB:-kanban}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Port 5432 is NOT exposed externally in production.
    # Backend reaches postgres via the internal Docker network only.
    ports: []

  # ── Backend ───────────────────────────────────────────────────────────────────
  backend:
    image: ${REGISTRY}/kanban-backend:${VERSION}
    build: null
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-kanban}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-kanban}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY_MS: ${JWT_EXPIRY_MS:-3600000}
    volumes:
      - kanban-uploads:/app/uploads
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/api/v1/health || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 5
    # Backend is not exposed directly; nginx proxies /api and /ws to it.
    ports: []

  # ── Frontend ──────────────────────────────────────────────────────────────────
  frontend:
    image: ${REGISTRY}/kanban-frontend:${VERSION}
    build: null
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      HOSTNAME: "0.0.0.0"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ || exit 1"]
      interval: 15s
      timeout: 5s
      start_period: 20s
      retries: 3
    # Frontend is not exposed directly; nginx proxies / to it.
    ports: []

  # ── Ollama (local LLM) ────────────────────────────────────────────────────────
  ollama:
    restart: unless-stopped
    # Bind to loopback only — never expose the LLM inference port on 0.0.0.0.
    ports:
      - "127.0.0.1:11434:11434"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Agent ─────────────────────────────────────────────────────────────────────
  agent:
    image: ${REGISTRY}/kanban-agent:${VERSION}
    build: null
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      BACKEND_URL: http://backend:8080
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health', timeout=4)"]
      interval: 15s
      timeout: 5s
      retries: 5
    # Agent is not exposed directly; nginx could proxy /agent if needed.
    ports: []

  # ── Nginx reverse proxy ───────────────────────────────────────────────────────
  nginx:
    # nginx:1.27.x-alpine — pinned minor series; update patch on CVE advisories.
    image: nginx:1.27.4-alpine3.21
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  kanban-postgres-data:
  kanban-uploads:

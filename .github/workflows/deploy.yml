name: Deploy — Build, Test, Push, Deploy to EC2

on:
  push:
    branches:
      - main

# Serialise production deploys — never cancel a deploy in flight.
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.ECR_REGISTRY }}

jobs:

  # ── Backend tests ─────────────────────────────────────────────────────────────
  test-backend:
    name: Test — Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codebase/backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      - name: Run backend tests
        run: ./gradlew cleanTest test --no-daemon

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: codebase/backend/build/reports/tests/

  # ── Frontend tests ────────────────────────────────────────────────────────────
  test-frontend:
    name: Test — Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: codebase/frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: codebase/frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npx vitest run

  # ── Build and push images to ECR ──────────────────────────────────────────────
  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    outputs:
      image-tag: ${{ steps.image-tag.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image tag (short SHA)
        id: image-tag
        # Short SHA gives full traceability to the commit. Never use :latest.
        run: echo "tag=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Log in to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/kanban-backend:${{ steps.image-tag.outputs.tag }}"
          docker build -t "$IMAGE" codebase/backend/
          docker push "$IMAGE"

      - name: Build and push frontend image
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/kanban-frontend:${{ steps.image-tag.outputs.tag }}"
          docker build \
            --build-arg NEXT_PUBLIC_API_URL="${{ vars.NEXT_PUBLIC_API_URL }}" \
            --build-arg NEXT_PUBLIC_WS_URL="${{ vars.NEXT_PUBLIC_WS_URL }}" \
            --build-arg NEXT_PUBLIC_AGENT_URL="${{ vars.NEXT_PUBLIC_AGENT_URL }}" \
            -t "$IMAGE" codebase/frontend/
          docker push "$IMAGE"

      - name: Build and push agent image
        run: |
          IMAGE="${{ env.ECR_REGISTRY }}/kanban-agent:${{ steps.image-tag.outputs.tag }}"
          docker build -t "$IMAGE" agent/
          docker push "$IMAGE"

  # ── Deploy to EC2 via SSH ─────────────────────────────────────────────────────
  deploy:
    name: Deploy to EC2 (ap-south-1)
    runs-on: ubuntu-latest
    needs: [build-and-push]
    environment: production

    steps:
      - name: SSH deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:     ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key:      ${{ secrets.EC2_SSH_KEY }}
          # The EC2 instance must have an IAM instance profile with
          # AmazonEC2ContainerRegistryReadOnly permission so it can pull from ECR.
          # EC2_DEPLOY_PATH should be set as a GitHub Actions variable (e.g. /home/ec2-user/app).
          envs: ECR_REGISTRY,AWS_REGION
          script: |
            set -e

            cd "${{ vars.EC2_DEPLOY_PATH }}"

            # ── Pre-deploy database backup ─────────────────────────────────────
            # Always snapshot the database before the new backend starts so that
            # any failed migration can be rolled back by restoring this dump.
            BACKUP_DIR="$PWD/backups"
            mkdir -p "$BACKUP_DIR"
            PG_CONTAINER=$(docker ps --format '{{.Names}}' | grep postgres | head -1 || true)
            if [ -n "$PG_CONTAINER" ]; then
              BACKUP_FILE="$BACKUP_DIR/pre-deploy-$(date +%Y%m%d-%H%M%S).sql.gz"
              PG_USER=$(grep '^POSTGRES_USER=' .env | cut -d= -f2 || echo 'kanban')
              PG_DB=$(grep '^POSTGRES_DB='   .env | cut -d= -f2 || echo 'kanban')
              docker exec "$PG_CONTAINER" pg_dump -U "$PG_USER" "$PG_DB" \
                | gzip > "$BACKUP_FILE"
              echo "Backup saved: $BACKUP_FILE ($(du -sh "$BACKUP_FILE" | cut -f1))"
              # Retain the 7 most recent backups; delete older ones.
              ls -t "$BACKUP_DIR"/*.sql.gz 2>/dev/null | tail -n +8 | xargs rm -f || true
            else
              echo "No running postgres container found — skipping backup (fresh deploy)."
            fi

            # ── Patch secrets into .env ────────────────────────────────────────
            # This file must already exist with the non-secret values filled in;
            # we only patch the two secret keys here so they are never baked into
            # the image or the workflow log.
            sed -i "s|^POSTGRES_PASSWORD=.*|POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}|" .env
            sed -i "s|^JWT_SECRET=.*|JWT_SECRET=${{ secrets.JWT_SECRET }}|" .env

            # ── Authenticate Docker with ECR ───────────────────────────────────
            aws ecr get-login-password --region "$AWS_REGION" \
              | docker login --username AWS --password-stdin "$ECR_REGISTRY"

            # ── Pull new images and restart services ───────────────────────────
            export VERSION="${{ needs.build-and-push.outputs.image-tag }}"
            export REGISTRY="$ECR_REGISTRY"

            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build

            # ── Reclaim disk space ─────────────────────────────────────────────
            # Remove all unused images (not just dangling) to reclaim disk space.
            # Safe here because the new containers are already up, so their images
            # are referenced and won't be removed.
            docker image prune -af

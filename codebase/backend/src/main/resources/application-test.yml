spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/kanban_test}
    username: ${SPRING_DATASOURCE_USERNAME:kanban}
    password: ${SPRING_DATASOURCE_PASSWORD:kanban123}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: KanbanTestHikariPool
      maximum-pool-size: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    out-of-order: true
    locations: classpath:db/migration

server:
  port: 0

jwt:
  secret: ${JWT_SECRET:test-secret-key-for-testing-only-12345678}

app:
  upload-dir: ./test-uploads
